name: Nuclei DAST Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  nuclei_scan:
    name: Run Nuclei DAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Nuclei Scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          # Pass all scan parameters directly as flags inside the args field
          args: '-target https://buy-me-sting.vercel.app -severity critical,high -sarif-export nuclei.sarif -timeout 3 -rate-limit 50'

      - name: Upload Scan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-scan-report
          path: nuclei.sarif

      - name: Upload SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'nuclei.sarif'
