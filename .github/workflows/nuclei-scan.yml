name: Nuclei DAST Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
#This is a test comment.
jobs:
  nuclei_scan:
    name: Run Nuclei DAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Nuclei Scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: '-target https://buy-me-sting.vercel.app -severity critical,high -sarif-export nuclei.sarif -timeout 3 -rate-limit 50'

      # If no findings were found, create a valid empty SARIF run object so GitHub's API accepts it.
      - name: Create Empty SARIF if missing
        run: |
          if [ ! -f nuclei.sarif ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Nuclei"}},"results":[]}]}' > nuclei.sarif
          fi

      - name: Upload Scan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-scan-report
          path: nuclei.sarif

      - name: Upload SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'nuclei.sarif'
